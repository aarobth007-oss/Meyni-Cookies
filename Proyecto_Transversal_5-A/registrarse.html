<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEYNI COOKIES - LOGIN</title>
    <link rel="icon" href="Imagenes/logotipo.png" type="image/x-icon">
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative; 
            overflow: hidden; 
        }

        .background-image {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url('Imagenes/logo01.png'); 
            background-size: cover;
            filter: blur(1px) brightness(0.8); 
            z-index: 1; 
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(248, 155, 202, 0.5); 
            z-index: 2; 
        }

        .container {
            background-color: rgba(255, 255, 255, 0.9); 
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            width: 300px; 
            z-index: 3; 
            position: relative; 
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #d81b60; 
        }

        .form-group {
            margin-bottom: 15px;
            text-align: center; 
        }

        label {
            display: block;
            margin-bottom: 5px;
        }

        input {
            width: 80%; 
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            text-align: center; 
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #d81b60; 
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #c2185b; 
        }

        .back-button {
            display: block;
            margin-bottom: 10px;
            text-decoration: none;
            color: #d81b60; 
            text-align: center; 
        }

        .back-button:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="background-image"></div>
    <div class="overlay"></div>
    
    <div class="container">
        <a href="Pagina_Principal.html" class="back-button">← Regresar</a>
        
        <form class="form" id="login-form">
            <h2>Iniciar Sesión</h2>
            <div class="form-group">
                <label for="username">Usuario:</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit">Iniciar Sesión</button>
        </form>

        <form class="form" id="register-form">
            <h2>Registro</h2>
            <div class="form-group">
                <label for="new-username">Nuevo Usuario:</label>
                <input type="text" id="new-username" name="new-username" required>
            </div>
            <div class="form-group">
                <label for="new-password">Nueva Contraseña:</label>
                <input type="password" id="new-password" name="new-password" required>
            </div>
            <button type="submit">Registrarse</button>
        </form>
    </div>
</body>
</html>
