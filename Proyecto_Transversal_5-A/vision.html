<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEYNI COOKIES - VISION</title>
    <link rel="icon" href="Imagenes/logotipo.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: #f7e3d7;
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: #e0e0e0;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .page-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: #d81b60;
            display: flex;
            align-items: center;
        }

        .page-title i {
            margin-right: 5px;
        }

        .back-link {
            text-decoration: none;
            color: #d81b60;
            font-weight: bold;
            display: flex;
            align-items: center;
        }

        .back-link i {
            margin-right: 5px;
        }

        main {
            flex-grow: 1;
            padding: 30px;
            max-width: 800px;
            margin: 50px auto;
            background-color: #fff;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            color: #d81b60;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
        }

        h1 i {
            margin-right: 5px;
        }

        p {
            margin: 15px 0;
            line-height: 1.6;
            text-align: center;
        }

        .icons-container {
            display: flex;
            justify-content: center;
            margin-top: 30px;
        }

        .icon {
            text-align: center;
            margin: 0 20px;
        }

        .icon img {
            max-width: 80px;
            height: auto;
        }

        footer {
            background-color: #e0e0e0;
            padding: 10px;
            text-align: center;
            width: 100%;
            margin-top: auto;
        }
    </style>
</head>
<body>
    <header>
        <div class="page-title"><i class="fas fa-eye"></i>Visión</div>
        <a href="Pagina_Principal.html" class="back-link"><i class="fas fa-home"></i>Volver a Inicio</a>
    </header>

    <main>
        <div class="content">
            <h1><i class="fas fa-star"></i>Nuestra Visión</h1>
            <p>
                Nuestra visión es ser reconocidos a nivel regional por la innovación, la calidad y el compromiso con la sociedad.
            </p>
            <div class="icons-container">
                <div class="icon">
                    <img src="Imagenes/icono04.png" alt="Innovación">
                    <p>Innovación</p>
                </div>
                <div class="icon">
                    <img src="Imagenes/icono05.png" alt="Calidad">
                    <p>Calidad y compromiso</p>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2024 Galletas Deliciosas. Derechos reservados CECyTES "Justo Sierra".</p>
    </footer>
</body>
</html>
